name: Generate Protobuf

on:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install protoc
        run: |
          sudo apt-get update -q
          sudo apt-get install -y protobuf-compiler

      - name: Install Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate payment
        run: |
          mkdir -p gen/payment
          protoc --go_out=gen --go_opt=paths=source_relative \
                 --go-grpc_out=gen --go-grpc_opt=paths=source_relative \
                 proto-repo/payment/payment.proto

      - name: Generate order
        run: |
          mkdir -p gen/order
          protoc --go_out=gen --go_opt=paths=source_relative \
                 --go-grpc_out=gen --go-grpc_opt=paths=source_relative \
                 proto-repo/order/order.proto

      - name: Push generated code to ap2-generated repo
        env:
          GEN_TOKEN: ${{ secrets.GEN_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${GEN_TOKEN}@github.com/ArlanAidarov/ap2-generated.git out
          cp -r gen/payment out/payment
          cp -r gen/order   out/order
          cd out
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add .
          git diff --cached --quiet || git commit -m "chore: regenerate proto $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
